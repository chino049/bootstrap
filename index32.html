```html
<!DOCTYPE html>
<html>
<head>
<title>Finance Analytics Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="theme-link" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/minty/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

<style>

body { overflow-x:hidden; }

.navbar { background:#0d6efd !important; }

.sidebar { min-height:100vh; background:#343a40; }

.sidebar a{
color:white;
display:block;
padding:10px;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover { background:#495057; }
.sidebar a.active { background:#0d6efd; }

.loading{ text-align:center; padding:40px; }

body.dark-mode { background:#121212 !important; color:#f5f5f5 !important; }
body.dark-mode .card { background:#1e1e1e; color:#f5f5f5; }

.graph-row{ display:flex; flex-wrap:wrap; gap:1rem; }

.graph-card{ flex:1 1 30%; min-width:300px; }

.graph-container{ height:320px; }

.graph-controls{ margin-bottom:10px; }

</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">

<span class="navbar-brand">Finance Dashboard</span>

<div class="d-flex align-items-center">

<button id="toggle-dark" class="btn btn-outline-light btn-sm me-2">🌙</button>

<select id="themeSwitcher" class="form-select form-select-sm" style="width:auto;">
<option value="minty">Minty</option>
<option value="lux">Lux</option>
<option value="cerulean">Cerulean</option>
<option value="cosmo">Cosmo</option>
<option value="cyborg">Cyborg</option>
<option value="darkly">Darkly</option>
<option value="flatly">Flatly</option>
<option value="journal">Journal</option>
<option value="litera">Litera</option>
<option value="lumen">Lumen</option>
<option value="materia">Materia</option>
<option value="pulse">Pulse</option>
<option value="quartz">Quartz</option>
<option value="sandstone">Sandstone</option>
<option value="simplex">Simplex</option>
<option value="sketchy">Sketchy</option>
<option value="slate">Slate</option>
<option value="solar">Solar</option>
<option value="spacelab">Spacelab</option>
<option value="superhero">Superhero</option>
<option value="united">United</option>
<option value="vapor">Vapor</option>
<option value="zephyr">Zephyr</option>
</select>

</div>
</div>
</nav>

<div class="container-fluid">
<div class="row">

<div class="col-3 col-md-2 sidebar p-3">

<h5 class="text-white mb-4">Menu</h5>

<a href="#" id="homeLink" class="active">Home</a>
<a href="#" id="dashboardLink">Dashboard</a>
<a href="#" id="reportsLink">PostgreSQL</a>
<a href="#" id="sqlLink">SQL Console</a>
<a href="#" id="graphsLink">Graphs</a>
<a href="#" id="pythonLink">Command Console</a>

<a href="https://www.xero.com/us/login/" target="_blank">Xero</a>

</div>

<div class="col-9 col-md-10 p-4">

<div id="mainContent">

<div class="card shadow-sm">
<div class="card-body">
<h2>Welcome</h2>
<p>Select a tool from the sidebar.</p>
</div>
</div>

</div>

</div>
</div>
</div>

<footer class="text-center p-3 border-top">
Dashboard System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<script>

/* THEME */

const toggle = document.getElementById('toggle-dark');

if(localStorage.getItem('themeMode')==='dark'){
document.body.classList.add('dark-mode');
}

toggle.onclick=()=>{
document.body.classList.toggle('dark-mode');
localStorage.setItem('themeMode',document.body.classList.contains('dark-mode')?'dark':'light');
};

const themeLink=document.getElementById('theme-link');
const themeSelect=document.getElementById('themeSwitcher');

if(localStorage.getItem('themeBootswatch')){
const saved=localStorage.getItem('themeBootswatch');
themeLink.href=`https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/${saved}/bootstrap.min.css`;
themeSelect.value=saved;
}

themeSelect.onchange=()=>{
const theme=themeSelect.value;
themeLink.href=`https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/${theme}/bootstrap.min.css`;
localStorage.setItem('themeBootswatch',theme);
};

/* UTIL */

function showLoading(){
document.getElementById("mainContent").innerHTML=`
<div class="loading">
<div class="spinner-border text-primary"></div>
<p class="mt-3">Loading...</p>
</div>`;
}

function setActive(id){
document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* DASHBOARD */

function loadDashboard(){

showLoading();

fetch("/metabase-url")
.then(res=>res.json())
.then(data=>{

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">
<div class="card-body">

<h4>Metabase Dashboard</h4>

<iframe src="${data.url}" width="100%" height="800"
sandbox="allow-same-origin allow-scripts allow-popups"></iframe>

</div>
</div>

`;

});

}

/* POSTGRES */

function loadPostgres(){

showLoading();

fetch("/pg-test")
.then(res=>res.json())
.then(data=>{

if(data.status==="connected"){

let headers="";
let rows="";

const cols=data.colOrder||[];

cols.forEach(c=>headers+=`<th>${c}</th>`);

data.sample.forEach(row=>{

rows+="<tr>";

cols.forEach(c=>rows+=`<td>${row[c]}</td>`);

rows+="</tr>";

});

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">
<div class="card-body">

<h4>PostgreSQL: bank_transactions</h4>

<div class="alert alert-success">
Database Connected: ${data.database}
</div>

<div class="table-responsive">

<table id="pgTable" class="table table-striped table-hover">

<thead class="table-dark">
<tr>${headers}</tr>
</thead>

<tbody>${rows}</tbody>

</table>

</div>
</div>
</div>
`;

setTimeout(()=>$('#pgTable').DataTable(),100);

}

});

}

/* SQL CONSOLE */

function loadSQLConsole(){

showLoading();

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">
<div class="card-body">

<h4>SQL Console</h4>

<textarea id="sqlQuery" class="form-control mb-3" rows="6">
SELECT * FROM bank_transactions
</textarea>

<button class="btn btn-primary mb-3" onclick="runSQL()">
Run Query
</button>

<div id="sqlResults"></div>

</div>
</div>
`;

}

function runSQL(){

const query=document.getElementById("sqlQuery").value;

fetch("/run-sql",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})

})
.then(res=>res.json())
.then(data=>{

if(data.error){
document.getElementById("sqlResults").innerHTML=`<div class="alert alert-danger">${data.error}</div>`;
return;
}

let headers="";
let rows="";

if(data.rows.length){

Object.keys(data.rows[0]).forEach(c=>headers+=`<th>${c}</th>`);

data.rows.forEach(r=>{
rows+="<tr>";
Object.values(r).forEach(v=>rows+=`<td>${v}</td>`);
rows+="</tr>";
});

}

document.getElementById("sqlResults").innerHTML=`

<table id="sqlTable" class="table table-striped table-hover">

<thead class="table-dark">
<tr>${headers}</tr>
</thead>

<tbody>${rows}</tbody>

</table>
`;

setTimeout(()=>$('#sqlTable').DataTable(),100);

});

}

/* COMMAND CONSOLE */

function loadCommandConsole(){

showLoading();

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">
<div class="card-body">

<h4>Command Console</h4>

<textarea id="cmdInput"
class="form-control mb-3"
rows="3"
placeholder="e.g. ls -la"></textarea>

<button class="btn btn-primary mb-2 d-block" id="runCmd">
Run Command
</button>

<button class="btn btn-success mb-3 d-block" id="runPython">
Run Python
</button>

<pre id="cmdOutput"></pre>

</div>
</div>
`;

document.getElementById("runCmd").onclick=()=>{

const cmd=document.getElementById("cmdInput").value;

document.getElementById("cmdOutput").textContent="Running...";

fetch("/run-command",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({command:cmd})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("cmdOutput").textContent=data.output;
});

};

document.getElementById("runPython").onclick=()=>{

document.getElementById("cmdOutput").textContent="Running Python script...";

fetch("/run-python",{
method:"POST",
headers:{"Content-Type":"application/json"}
})
.then(res=>res.json())
.then(data=>{
document.getElementById("cmdOutput").textContent=data.output;
});

};

}

/* GRAPHS */

let chart930,chart476,chart446,chart477;

function downloadChart(chart,name){
const link=document.createElement("a");
link.href=chart.toBase64Image();
link.download=name;
link.click();
}

function createChart(ctx,data,color,chartId){

return new Chart(ctx,{
type:"bar",

data:{
labels:data.map(r=>new Date(r.trans_date).toLocaleDateString()),
datasets:[{

label:"Gross Amount",
data:data.map(r=>r.gross),
fullData:data,

backgroundColor:data.map(r=>{

const desc=(r.trans_des||"").toLowerCase();

if(chartId==="477"){

if(desc.includes("caretaker")||desc.includes("mike")||desc.includes("michael")){
return "rgba(255,99,132,0.8)";
}

if(
desc.includes("admin") ||
(
desc.includes("jasmin d - salary") &&
!desc.includes("bookeeper") &&
!desc.includes("bernade")
)
){
return "rgba(54,162,235,0.8)";
}

}

return color;

})

}]
},

options:{
responsive:true,
maintainAspectRatio:false,

plugins:{

zoom:{
zoom:{wheel:{enabled:true},mode:"x"},
pan:{enabled:true,mode:"x"}
},

tooltip:{
callbacks:{
label:function(context){

const row=context.dataset.fullData[context.dataIndex];

return Object.entries(row).map(([k,v])=>`${k}: ${v}`);

}
}
}

}

}

});

}

function graphCard(id,title){

return `

<div class="card shadow-sm graph-card">

<div class="card-body">

<h4>Account ${id} ${title}</h4>

<div class="graph-controls">

<button class="btn btn-sm btn-secondary"
onclick="chart${id}.resetZoom()">Reset Zoom</button>

<button class="btn btn-sm btn-success"
onclick="downloadChart(chart${id},'${id}.png')">
Download PNG
</button>

</div>

<div class="graph-container">
<canvas id="chart${id}"></canvas>
</div>

</div>

</div>

`;

}

function loadGraphs(){

showLoading();

Promise.all([

fetch("/transactions-930").then(r=>r.json()),
fetch("/transactions-476").then(r=>r.json()),
fetch("/transactions-446").then(r=>r.json()),
fetch("/transactions-477").then(r=>r.json())

]).then(([d930,d476,d446,d477])=>{

document.getElementById("mainContent").innerHTML=`

<div class="graph-row">

${graphCard("930","Payment to Owners")}
${graphCard("476","Labor")}
${graphCard("446","Water")}
${graphCard("477","Wages and Salaries")}

</div>

`;

chart930=createChart(document.getElementById("chart930"),d930,"rgba(75,192,192,0.6)","930");
chart476=createChart(document.getElementById("chart476"),d476,"rgba(255,99,132,0.6)","476");
chart446=createChart(document.getElementById("chart446"),d446,"rgba(54,162,235,0.6)","446");
chart477=createChart(document.getElementById("chart477"),d477,"rgba(255,206,86,0.6)","477");

});

}

/* EVENTS */

document.getElementById("dashboardLink").onclick=e=>{
e.preventDefault(); setActive("dashboardLink"); loadDashboard();
};

document.getElementById("reportsLink").onclick=e=>{
e.preventDefault(); setActive("reportsLink"); loadPostgres();
};

document.getElementById("sqlLink").onclick=e=>{
e.preventDefault(); setActive("sqlLink"); loadSQLConsole();
};

document.getElementById("graphsLink").onclick=e=>{
e.preventDefault(); setActive("graphsLink"); loadGraphs();
};

document.getElementById("pythonLink").onclick=e=>{
e.preventDefault(); setActive("pythonLink"); loadCommandConsole();
};

document.getElementById("homeLink").onclick=e=>{
e.preventDefault(); setActive("homeLink"); location.reload();
};

</script>

</body>
</html>
```
