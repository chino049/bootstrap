<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { overflow-x: hidden; }
    .sidebar { height: 100vh; background-color: #343a40; }
    .sidebar a { color: white; text-decoration: none; display: block; padding: 10px; }
    .sidebar a:hover { background-color: #495057; }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-3 col-md-2 sidebar p-3">
      <h4 class="text-white">Menu</h4>
      <a href="#" id="dashboardLink">Dashboard</a>
      <a href="#">Home</a>
      <a href="#">Reports</a>
    </div>

    <!-- Main content -->
    <div class="col-9 col-md-10 p-4" id="mainContent">
      <h1>Welcome</h1>
      <p>Click "Dashboard" to load the Metabase dashboard.</p>
    </div>

  </div>
</div>

<script>
document.getElementById("dashboardLink").addEventListener("click", function(e){
  e.preventDefault();

  fetch("/metabase-url")
    .then(res => res.json())
    .then(data => {
      document.getElementById("mainContent").innerHTML = `
        <iframe src="${data.url}" width="100%" height="800" frameborder="0" allowtransparency></iframe>
      `;
    });
});
</script>

</body>
</html>
