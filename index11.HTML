<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lux/bootstrap.min.css" rel="stylesheet">

<style>
body { overflow-x: hidden; }

.sidebar{
  min-height:100vh;
  background:#343a40;
}

.sidebar a{
  color:white;
  text-decoration:none;
  display:block;
  padding:10px;
  border-radius:6px;
}

.sidebar a:hover{
  background:#495057;
}

.sidebar a.active{
  background:#0d6efd;
}

.loading{
  text-align:center;
  padding:40px;
}

</style>
</head>

<body>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Data Dashboard</span>
<span class="text-white">Analytics Portal</span>
</div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-3 col-md-2 sidebar p-3">

<h5 class="text-white mb-4">Menu</h5>

<a href="#" id="homeLink" class="active">Home</a>
<a href="#" id="dashboardLink">Dashboard</a>
<a href="#" id="reportsLink">PostgreSQL</a>

<a href="https://www.xero.com/us/login/" target="_blank">Xero</a>

</div>

<!-- MAIN CONTENT -->
<div class="col-9 col-md-10 p-4">

<div id="mainContent">

<div class="card shadow-sm">
<div class="card-body">
<h2>Welcome</h2>
<p>Select an option from the menu to load dashboards or database data.</p>
</div>
</div>

</div>

</div>

</div>
</div>

<footer class="text-center p-3 border-top mt-3">
Dashboard System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function showLoading(){
document.getElementById("mainContent").innerHTML = `
<div class="loading">
<div class="spinner-border text-primary"></div>
<p class="mt-3">Loading...</p>
</div>
`;
}

function setActive(linkId){
document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
document.getElementById(linkId).classList.add("active");
}

function loadDashboard(){

showLoading();

fetch("/metabase-url")
.then(res=>res.json())
.then(data=>{
document.getElementById("mainContent").innerHTML = `
<div class="card shadow-sm">
<div class="card-body">
<h4 class="mb-3">Metabase Dashboard</h4>

<iframe src="${data.url}"
width="100%"
height="800"
frameborder="0">
</iframe>

</div>
</div>
`;
});

}

function loadPostgres(){

showLoading();

fetch("/pg-test")
.then(res=>res.json())
.then(data=>{

if(data.status==="connected"){

let headers="";
if(data.sample.length>0){
for(const col in data.sample[0]){
headers+=`<th>${col}</th>`;
}
}

let rows="";
data.sample.forEach(row=>{
rows+="<tr>";
for(const col in row){
rows+=`<td>${row[col]}</td>`;
}
rows+="</tr>";
});

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">

<div class="card-body">

<h4 class="mb-3">PostgreSQL: bank_transactions</h4>

<div class="alert alert-success">
Database Connected: ${data.database}
</div>

<p><strong>Rows returned:</strong> ${data.rowsReturned}</p>

<div class="table-responsive">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>${headers}</tr>
</thead>

<tbody>
${rows}
</tbody>

</table>

</div>

</div>

</div>
`;

}else{

document.getElementById("mainContent").innerHTML=`

<div class="alert alert-danger">
Database Connection Failed
</div>

<p>${data.error}</p>
`;

}

});

}

document.getElementById("dashboardLink").addEventListener("click",function(e){
e.preventDefault();
setActive("dashboardLink");
loadDashboard();
});

document.getElementById("homeLink").addEventListener("click",function(e){
e.preventDefault();
setActive("homeLink");

document.getElementById("mainContent").innerHTML=`

<div class="card shadow-sm">
<div class="card-body">

<h2>Home</h2>

<p>Welcome to the analytics dashboard.</p>

<p>
Use the sidebar to load the Metabase dashboard or view PostgreSQL data.
</p>

</div>
</div>

`;

});

document.getElementById("reportsLink").addEventListener("click",function(e){
e.preventDefault();
setActive("reportsLink");
loadPostgres();
});

</script>

</body>
</html>
