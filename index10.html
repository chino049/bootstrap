<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Dashboard</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <!-- Bootswatch Theme (includes Bootstrap) -->
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lux/bootstrap.min.css" rel="stylesheet">
  <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  -->
  <style>
    body { overflow-x: hidden; }
    .sidebar { height: 100vh; background-color: #343a40; }
    .sidebar a { color: white; text-decoration: none; display: block; padding: 10px; }
    .sidebar a:hover { background-color: #495057; }
  </style>
</head>
<body>
 <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-3 col-md-2 sidebar p-3">
      <h4 class="text-white">Menu</h4>
      <a href="#" id="homeLink">Home</a>    
      <a href="#" id="dashboardLink">Dashboard</a>

      <a href="#" id="reportsLink">PostgreSQL</a>
      <a href="https://www.xero.com/us/login/" target="_blank" rel="noopener noreferrer">Xero</a>
      
    </div>

    <!-- Main content -->
    <div class="col-9 col-md-10 p-4" id="mainContent">
      <h1>Welcome</h1>
      <p>Click "Dashboard" to load the Metabase dashboard.</p>
    </div>

  </div>
</div>

<script>

   // foe xero 
   //document.getElementById("xerolink").addEventListener("click", function(e){
  //e.preventDefault();
  //window.open("https://login.xero.com/", "_blank");
//});

  // Load Metabase dashboard
  function loadDashboard() {
    fetch("/metabase-url")
      .then(res => res.json())
      .then(data => {
        document.getElementById("mainContent").innerHTML = `
          <iframe src="${data.url}"
                  width="100%"
                  height="800"
                  frameborder="0"
                  allowtransparency>
          </iframe>
        `;
      });
  }

  // Load PostgreSQL bank_transactions table
  function loadPostgres() {
    fetch("/pg-test")
      .then(res => res.json())
      .then(data => {
        if(data.status === "connected"){

          // Build table headers
          let tableHeaders = "";
          if(data.sample.length > 0){
            for(const col in data.sample[0]){
              tableHeaders += `<th>${col}</th>`;
            }
          }

          // Build table rows
          let tableRows = "";
          data.sample.forEach(row => {
            tableRows += "<tr>";
            for(const col in row){
              tableRows += `<td>${row[col]}</td>`;
            }
            tableRows += "</tr>";
          });

          document.getElementById("mainContent").innerHTML = `
            <h2>PostgreSQL: bank_transactions</h2>
            <div class="alert alert-success">
              Database Connected: ${data.database}
            </div>
            <p><strong>Rows returned:</strong> ${data.rowsReturned}</p>
            <div class="table-responsive">
              <table class="table table-striped table-bordered">
                <thead>
                  <tr>${tableHeaders}</tr>
                </thead>
                <tbody>
                  ${tableRows}
                </tbody>
              </table>
            </div>
          `;

        } else {
          document.getElementById("mainContent").innerHTML = `
            <h2>PostgreSQL Status</h2>
            <div class="alert alert-danger">
              Database Connection Failed
            </div>
            <p>${data.error}</p>
          `;
        }
      });
  }

  // Sidebar menu events
  document.getElementById("dashboardLink").addEventListener("click", function(e){
    e.preventDefault();
    loadDashboard();
  });

  document.getElementById("homeLink").addEventListener("click", function(e){
    e.preventDefault();
    document.getElementById("mainContent").innerHTML = `
      <h1>Home</h1>
      <p>Welcome to the Home page!</p>
    `;
  });

  document.getElementById("reportsLink").addEventListener("click", function(e){
    e.preventDefault();
    loadPostgres();
  });
</script>

</body>
</html>
