<!DOCTYPE html>
<html>
<head>
<title>Finance Analytics Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootswatch Theme -->
<!-- <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lux/bootstrap.min.css" rel="stylesheet"> 
<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cerulean/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/superhero/bootstrap.min.css" rel="stylesheet">
-->

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/minty/bootstrap.min.css" rel="stylesheet">

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

<style>
body { overflow-x:hidden; }
.sidebar { min-height:100vh; background:#343a40; }
.sidebar a { color:white; display:block; padding:10px; text-decoration:none; border-radius:6px; }
.sidebar a:hover { background:#495057; }
.sidebar a.active { background:#0d6efd; }
.loading { text-align:center; padding:40px; }

/* Dark mode */
body.dark-mode { background-color:#121212 !important; color:#f5f5f5 !important; }
body.dark-mode .card { background-color:#1e1e1e; color:#f5f5f5; }
body.dark-mode .table-dark { background-color:#2c2c2c !important; }
body.dark-mode .sidebar { background-color:#212529; }
body.dark-mode .sidebar a:hover { background-color:#495057; }
body.dark-mode .navbar { background-color:#0d6efd !important; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Finance Dashboard</span>
    <span class="text-white">Analytics Portal</span>
    <button id="toggle-dark" class="btn btn-outline-light btn-sm ms-3">🌙</button>
  </div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-3 col-md-2 sidebar p-3">
<h5 class="text-white mb-4">Menu</h5>
<a href="#" id="homeLink" class="active">Home</a>
<a href="#" id="dashboardLink">Dashboard</a>
<a href="#" id="reportsLink">PostgreSQL</a>
<a href="https://www.xero.com/us/login/" target="_blank">Xero</a>
</div>

<!-- MAIN CONTENT -->
<div class="col-9 col-md-10 p-4">
<div id="mainContent">
<div class="card shadow-sm">
<div class="card-body">
<h2>Welcome</h2>
<p>Select a tool from the sidebar.</p>
</div>
</div>
</div>
</div>

</div>
</div>

<footer class="text-center p-3 border-top">Dashboard System</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// === Dark mode toggle ===
const toggle = document.getElementById('toggle-dark');
const moonIcon = "🌙";
const sunIcon = "☀️";
if(localStorage.getItem('theme')==='dark'){ document.body.classList.add('dark-mode'); toggle.textContent=sunIcon; }
else { toggle.textContent=moonIcon; }
toggle.addEventListener('click', ()=>{
  const isDark = document.body.classList.toggle('dark-mode');
  toggle.textContent = isDark ? sunIcon : moonIcon;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

// === Loading spinner ===
function showLoading(){
  document.getElementById("mainContent").innerHTML=`
  <div class="loading">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3">Loading...</p>
  </div>`;
}

// === Sidebar active menu ===
function setActive(linkId){
  document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
  document.getElementById(linkId).classList.add("active");
}

// === METABASE DASHBOARD ===
function loadDashboard(){
  showLoading();
  fetch("/metabase-url").then(res=>res.json()).then(data=>{
    document.getElementById("mainContent").innerHTML=`
    <div class="card shadow-sm">
      <div class="card-body">
        <h4>Metabase Dashboard</h4>
        <iframe src="${data.url}" width="100%" height="800" frameborder="0"></iframe>
      </div>
    </div>`;
  });
}

// === POSTGRES DATA + CHARTS (with fixed column order) ===
function loadPostgres(){
  showLoading();
  fetch("/pg-test").then(res=>res.json()).then(data=>{
    if(data.status==="connected"){
      const colOrder = data.colOrder || []; // fixed order from server
      let headers="", rows="";
      let labels=[], amounts=[], balance=[];
      let runningBalance=0;

      // Use fixed order for headers
      colOrder.forEach(col=>{ headers += `<th>${col}</th>`; });

      // Build table rows
      data.sample.forEach(row=>{
        rows+="<tr>";
        colOrder.forEach(col=>{ rows += `<td>${row[col]}</td>`; });
        rows+="</tr>";

        const amt = Number(row.amount) || 0;
        labels.push(row.description || "Txn");
        amounts.push(amt);
        runningBalance += amt;
        balance.push(runningBalance);
      });

      // Render table and charts
      document.getElementById("mainContent").innerHTML=`
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5>Transaction Amounts</h5>
              <canvas id="amountChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5>Running Balance</h5>
              <canvas id="balanceChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h4>PostgreSQL: bank_transactions</h4>
          <div class="alert alert-success">Database Connected: ${data.database}</div>
          <p><strong>Rows returned:</strong> ${data.rowsReturned}</p>
          <div class="table-responsive">
            <table id="pgTable" class="table table-striped table-hover">
              <thead class="table-dark"><tr>${headers}</tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;

      setTimeout(()=>$('#pgTable').DataTable({ pageLength:10, lengthMenu:[10,25,50,100] }),100);

      setTimeout(()=>new Chart(document.getElementById("amountChart"),{
        type:"bar",
        data:{ labels:labels, datasets:[{ label:"Transaction Amount", data:amounts, backgroundColor:"rgba(54,162,235,0.6)" }] }
      }),200);

      setTimeout(()=>new Chart(document.getElementById("balanceChart"),{
        type:"line",
        data:{ labels:labels, datasets:[{ label:"Running Balance", data:balance, borderColor:"green", fill:false, tension:0.2 }] }
      }),300);

    } else {
      document.getElementById("mainContent").innerHTML=`
      <div class="alert alert-danger">Database Connection Failed</div>
      <p>${data.error}</p>`;
    }
  });
}

// === Menu events ===
document.getElementById("dashboardLink").addEventListener("click", e=>{ e.preventDefault(); setActive("dashboardLink"); loadDashboard(); });
document.getElementById("homeLink").addEventListener("click", e=>{ e.preventDefault(); setActive("homeLink"); document.getElementById("mainContent").innerHTML=`
<div class="card shadow-sm">
  <div class="card-body">
    <h2>Home</h2>
    <p>Welcome to your analytics dashboard.</p>
    <p>Use the sidebar to access:
      <ul>
        <li>Metabase dashboards</li>
        <li>PostgreSQL transaction data</li>
        <li>Financial charts</li>
      </ul>
    </p>
  </div>
</div>`; });
document.getElementById("reportsLink").addEventListener("click", e=>{ e.preventDefault(); setActive("reportsLink"); loadPostgres(); });
</script>

</body>
</html>
