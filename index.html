/* =====================
   THEME & DARK MODE
===================== */
const toggle=document.getElementById('toggle-dark');
if(localStorage.getItem('themeMode')==='dark'){ document.body.classList.add('dark-mode'); }
toggle.onclick=()=>{ 
  document.body.classList.toggle('dark-mode'); 
  localStorage.setItem('themeMode', document.body.classList.contains('dark-mode')?'dark':'light'); 
};

const themeLink=document.getElementById('theme-link');
const themeSelect=document.getElementById('themeSwitcher');
if(localStorage.getItem('themeBootswatch')){
  const saved=localStorage.getItem('themeBootswatch');
  themeLink.href=`https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/${saved}/bootstrap.min.css`;
  themeSelect.value=saved;
}
themeSelect.onchange=()=>{ 
  const theme=themeSelect.value;
  themeLink.href=`https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/${theme}/bootstrap.min.css`;
  localStorage.setItem('themeBootswatch',theme);
};

/* =====================
   UTILITIES
===================== */
function showLoading(){
  document.getElementById("mainContent").innerHTML=`
    <div class="loading">
      <div class="spinner-border text-primary"></div>
      <p class="mt-3">Loading...</p>
    </div>`;
}
function setActive(id){
  document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* =====================
   DASHBOARD / POSTGRES / SQL
===================== */
function loadDashboard(){
  showLoading();
  fetch("/metabase-url").then(res=>res.json()).then(data=>{
    document.getElementById("mainContent").innerHTML=`
      <div class="card shadow-sm">
        <div class="card-body">
          <h4>Metabase Dashboard</h4>
          <iframe src="${data.url}" width="100%" height="800"></iframe>
        </div>
      </div>`;
  });
}

function loadPostgres(){
  showLoading();
  fetch("/pg-test").then(res=>res.json()).then(data=>{
    if(data.status==="connected"){
      const colOrder=data.colOrder||[];
      let headers="",rows="";
      colOrder.forEach(c=>headers+=`<th>${c}</th>`);
      data.sample.forEach(row=>{
        rows+="<tr>";
        colOrder.forEach(c=>rows+=`<td>${row[c]}</td>`);
        rows+="</tr>";
      });
      document.getElementById("mainContent").innerHTML=`
      <div class="card shadow-sm">
        <div class="card-body">
          <h4>PostgreSQL: bank_transactions</h4>
          <div class="alert alert-success">Database Connected: ${data.database}</div>
          <div class="table-responsive">
            <table id="pgTable" class="table table-striped table-hover">
              <thead class="table-dark"><tr>${headers}</tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
      setTimeout(()=>$('#pgTable').DataTable(),100);
    }
  });
}

function loadSQLConsole(){
  showLoading();
  document.getElementById("mainContent").innerHTML=`
    <div class="card shadow-sm">
      <div class="card-body">
        <h4>SQL Console</h4>
        <textarea id="sqlQuery" class="form-control mb-3" rows="6">SELECT * FROM bank_transactions</textarea>
        <button class="btn btn-primary mb-3" onclick="runSQL()">Run Query</button>
        <div id="sqlResults"></div>
      </div>
    </div>`;
}
function runSQL(){
  const query=document.getElementById("sqlQuery").value;
  fetch("/run-sql",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query})})
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      document.getElementById("sqlResults").innerHTML=`<div class="alert alert-danger">${data.error}</div>`;
      return;
    }
    let headers="",rows="";
    if(data.rows.length>0){
      Object.keys(data.rows[0]).forEach(col=>headers+=`<th>${col}</th>`);
      data.rows.forEach(r=>{
        rows+="<tr>";
        Object.values(r).forEach(v=>rows+=`<td>${v}</td>`);
        rows+="</tr>";
      });
    }
    document.getElementById("sqlResults").innerHTML=`
      <table id="sqlTable" class="table table-striped table-hover">
        <thead class="table-dark"><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    setTimeout(()=>$('#sqlTable').DataTable(),100);
  });
}

/* =====================
   GRAPHS WITH DRILL-DOWN
===================== */
let chart930, chart476, chart446, chart477, chart473, chart445;

function showTransactions(rows){
  if(rows.length===0) return;
  let headers="", body="";
  Object.keys(rows[0]).forEach(c=>headers+=`<th>${c}</th>`);
  rows.forEach(r=>{
    body+="<tr>";
    Object.values(r).forEach(v=>body+=`<td>${v}</td>`);
    body+="</tr>";
  });
  document.getElementById("transactionTable").innerHTML=`
  <h4 class="mt-4">Transactions Behind Selected Bar</h4>
  <table id="drillTable" class="table table-striped table-hover">
    <thead class="table-dark"><tr>${headers}</tr></thead>
    <tbody>${body}</tbody>
  </table>`;
  setTimeout(()=>$('#drillTable').DataTable(),100);
}

function createChart(ctx,data,color,chartId){
  return new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.map(r=>new Date(r.trans_date).toLocaleDateString()),
      datasets:[{
        label:"Gross Amount",
        data:data.map(r=>r.gross),
        fullData:data,
        backgroundColor:data.map(r=>{
          const desc=(r.trans_des||"").toLowerCase();

          if(chartId==="477"){
            if(desc.includes("caretaker") || desc.includes("mike") || desc.includes("michael"))
              return "rgba(255,99,132,0.8)";

            if(desc.includes("admin") ||
              (desc.includes("jasmin d - salary") &&
               !desc.includes("bookeeper") &&
               !desc.includes("bernade")))
              return "rgba(54,162,235,0.8)";
          }

          return color;
        })
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false,

      scales:{
        y:{
          beginAtZero:true,
          grace:"20%"   // ⭐ adds headroom so top labels never touch
        }
      },

      layout:{
        padding:{
          top:20
        }
      },

      onClick:(evt,elements,chart)=>{
        if(elements.length){
          const index=elements[0].index;
          const row=chart.data.datasets[0].fullData[index];
          const date=row.trans_date;

          const filtered=chart.data.datasets[0].fullData
            .filter(r=>r.trans_date===date);

          showTransactions(filtered);
        }
      },

      plugins:{
        zoom:{
          zoom:{wheel:{enabled:true},mode:"x"},
          pan:{enabled:true,mode:"x"}
        },

        tooltip:{
          callbacks:{
            label:context=>{
              const row=context.dataset.fullData[context.dataIndex];
              return Object.entries(row)
                .map(([k,v])=>`${k}: ${v}`);
            }
          }
        },

        datalabels:{
          anchor:"end",
          align:"top",
          offset:8,        // ⭐ pushes label above bar
          clamp:true,
          clip:false,
          color:"#000",
          font:{
            weight:"bold",
            size:11
          },
          formatter:value=>{
            return value.toLocaleString(undefined,{
              minimumFractionDigits:2
            });
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

function graphCard(id,title){return `
<div class="card shadow-sm graph-card">
<div class="card-body">
<h4>Account ${id} ${title}</h4>
<div class="graph-controls">
<button class="btn btn-sm btn-secondary" onclick="chart${id}.resetZoom()">Reset Zoom</button>
<button class="btn btn-sm btn-success" onclick="downloadChart(chart${id},'${id}.png')">Download PNG</button>
</div>
<div class="graph-container"><canvas id="chart${id}"></canvas></div>
</div>
</div>`;}

function downloadChart(chart,name){const link=document.createElement("a");link.href=chart.toBase64Image();link.download=name;link.click();}

function loadGraphs(){
  showLoading();
  Promise.all([
    fetch("/transactions-930").then(r=>r.json()),
    fetch("/transactions-476").then(r=>r.json()),    
    fetch("/transactions-477").then(r=>r.json()),
    fetch("/transactions-473").then(r=>r.json()),
    fetch("/transactions-446").then(r=>r.json()),
    fetch("/transactions-445").then(r=>r.json())
  ]).then(([d930,d476,d477,d473,d446,d445])=>{
    document.getElementById("mainContent").innerHTML=
    `<div class="graph-row">
      ${graphCard("930","Payment to Owners")}
      ${graphCard("476","Labor")}
      ${graphCard("477","Wages and Salaries")}
      ${graphCard("473","Materials, Repairs, and Maintenance")} 
      ${graphCard("446","Water")}
      ${graphCard("445","Electricity")}
    </div>
    <div id="transactionTable"></div>`;
    chart930=createChart(document.getElementById("chart930"),d930,"rgba(75,192,192,0.6)","930");
    chart476=createChart(document.getElementById("chart476"),d476,"rgba(255,99,132,0.6)","476");
    chart477=createChart(document.getElementById("chart477"),d477,"rgba(255,206,86,0.6)","477") 
    chart473=createChart(document.getElementById("chart473"),d473,"rgba(25,26,86,0.6)","473");   
    chart446=createChart(document.getElementById("chart446"),d446,"rgba(54,162,235,0.6)","446");
    chart445=createChart(document.getElementById("chart445"),d445,"rgba(154,12,25,0.6)","445");
;


  });
}
